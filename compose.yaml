services:
  mysql:
    image: mysql:8.0.44
    container_name: fastapi_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fastapi_app}
      MYSQL_USER: ${MYSQL_USER:-fastapi_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme_user}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-changeme_root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fastapi_network

  app:
    build: .
    container_name: fastapi_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+aiomysql://${MYSQL_USER:-fastapi_user}:${MYSQL_PASSWORD:-changeme_user}@mysql:3306/${MYSQL_DATABASE:-fastapi_app}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - ALERT_CPU_THRESHOLD=${ALERT_CPU_THRESHOLD:-10}
      - ALERT_MEMORY_THRESHOLD=${ALERT_MEMORY_THRESHOLD:-10}
      - ALERT_DISK_THRESHOLD=${ALERT_DISK_THRESHOLD:-40}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - fastapi_network

volumes:
  mysql_data:
    name: fastapi_mysql_data

networks:
  fastapi_network:
    name: fastapi_network
    driver: bridge