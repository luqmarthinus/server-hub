<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Hub · Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/profile.css">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark-glass px-3">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard"><i class="bi bi-hdd-stack-fill me-2"></i>Server Hub</a>
            <div class="d-flex align-items-center">
                <span class="navbar-text text-light me-3" id="userEmailNav">Loading...</span>
                <a href="/dashboard" class="btn btn-outline-light btn-sm me-2"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a href="/admin" id="adminNavLink" class="btn btn-outline-light btn-sm me-2" style="display: none;"><i class="bi bi-shield-lock"></i> Admin</a>
                <button id="logoutBtn" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i> Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card glass-card mb-4">
                    <div class="card-header bg-transparent border-0 pt-3">
                        <h5><i class="bi bi-person-circle me-2"></i>User Information</h5>
                    </div>
                    <div class="card-body">
                        <div id="userInfo">Loading...</div>
                    </div>
                </div>

                <div class="card glass-card mb-4">
                    <div class="card-header bg-transparent border-0 pt-3">
                        <h5><i class="bi bi-key me-2"></i>Change Password</h5>
                    </div>
                    <div class="card-body">
                        <form id="changePasswordForm">
                            <div class="mb-3">
                                <label for="currentPassword" class="form-label">Current Password</label>
                                <input type="password" class="form-control" id="currentPassword" required>
                            </div>
                            <div class="mb-3">
                                <label for="newPassword" class="form-label">New Password</label>
                                <input type="password" class="form-control" id="newPassword" required>
                            </div>
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">Confirm New Password</label>
                                <input type="password" class="form-control" id="confirmPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Update Password</button>
                            <div id="passwordMsg" class="mt-2"></div>
                        </form>
                    </div>
                </div>

                <div class="card glass-card border-danger">
                    <div class="card-header bg-transparent border-0 pt-3">
                        <h5 class="text-danger"><i class="bi bi-trash me-2"></i>Delete Account</h5>
                    </div>
                    <div class="card-body">
                        <p class="text-muted">Once you delete your account, all your reports will be permanently removed. This action cannot be undone.</p>
                        <button id="deleteAccountBtn" class="btn btn-danger">Delete My Account</button>
                        <div id="deleteMsg" class="mt-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/profile.js"></script>
</body>
</html>
