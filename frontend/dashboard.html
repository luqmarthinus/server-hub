<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Hub · Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark-glass px-3">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="bi bi-hdd-stack-fill me-2"></i>Server Hub</a>
            <div class="d-flex align-items-center">
                <span class="navbar-text text-light me-3" id="userEmailNav">Loading...</span>
                <button id="logoutBtn" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i> Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Row 1: Gauges (CPU, Memory, Disk) -->
        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <div class="card glass-card h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title"><i class="bi bi-cpu me-2"></i>CPU</h5>
                        <canvas id="cpuGauge" width="150" height="150" style="max-width: 100%; height: auto;"></canvas>
                        <div id="cpuPercent" class="mt-2 fw-bold"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card glass-card h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title"><i class="bi bi-memory me-2"></i>Memory</h5>
                        <canvas id="memGauge" width="150" height="150" style="max-width: 100%; height: auto;"></canvas>
                        <div id="memPercent" class="mt-2 fw-bold"></div>
                        <div id="memDetails" class="small text-muted mt-1"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card glass-card h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title"><i class="bi bi-hdd-stack me-2"></i>Disk Usage</h5>
                        <canvas id="diskGauge" width="150" height="150" style="max-width: 100%; height: auto;"></canvas>
                        <div id="diskPercent" class="mt-2 fw-bold"></div>
                        <div id="diskDetails" class="small text-muted mt-1"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Row 2: System Information -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card glass-card">
                    <div class="card-body">
                        <h5 class="card-title"><i class="bi bi-info-circle me-2"></i>System Information</h5>
                        <div id="sysInfo" class="row g-2">Loading...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Row 3: Controls (generate, export, stress, auto-refresh, date range) -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card glass-card">
                    <div class="card-body d-flex flex-wrap justify-content-between align-items-center gap-2">
                        <div>
                            <button id="generateBtn" class="btn btn-primary"><i class="bi bi-plus-circle me-2"></i>Generate Report</button>
                            <button id="exportBtn" class="btn btn-outline-light ms-2"><i class="bi bi-download"></i> Export CSV</button>
                            <button id="stressCpuBtn" class="btn btn-warning ms-2"><i class="bi bi-cpu"></i> Stress CPU</button>
                            <button id="stressMemBtn" class="btn btn-warning ms-2"><i class="bi bi-memory"></i> Stress Memory</button>
                            <button id="stressDiskBtn" class="btn btn-warning ms-2"><i class="bi bi-hdd"></i> Stress Disk</button>
                        </div>
                        <div class="d-flex align-items-center gap-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="autoRefreshCheck" checked>
                                <label class="form-check-label text-light" for="autoRefreshCheck">Auto-refresh (10s)</label>
                            </div>
                            <select id="dateRangeSelect" class="form-select w-auto">
                                <option value="1">Last 24 hours</option>
                                <option value="7" selected>Last 7 days</option>
                                <option value="30">Last 30 days</option>
                                <option value="">All time</option>
                            </select>
                        </div>
                    </div>
                    <div id="generateMsg" class="px-3 pb-2"></div>
                    <div id="stressMsg" class="px-3 pb-2 text-muted"></div>
                </div>
            </div>
        </div>

        <!-- Row 4: History Chart -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card glass-card">
                    <div class="card-header bg-transparent border-0 pt-3">
                        <h5><i class="bi bi-bar-chart-steps me-2"></i>CPU & Memory History (last 10 reports)</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="historyChart" width="400" height="200" style="max-height: 300px;"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Row 5: Reports Table -->
        <div class="row">
            <div class="col-12">
                <div class="card glass-card">
                    <div class="card-header bg-transparent border-0 pt-3">
                        <h5><i class="bi bi-table me-2"></i>Recent Reports</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-dark">
                                    <tr>
                                        <th><i class="bi bi-clock me-1"></i>Timestamp</th>
                                        <th><i class="bi bi-cpu me-1"></i>CPU %</th>
                                        <th><i class="bi bi-memory me-1"></i>Memory %</th>
                                        <th><i class="bi bi-hdd me-1"></i>Disk %</th>
                                        <th><i class="bi bi-wifi me-1"></i>Network (KB)</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="reportTable">
                                    <tr><td colspan="6" class="text-center text-muted py-4">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
