<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Hub · Dashboard</title>
    <!-- Bootstrap 5 + Icons + Chart.js -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar (optional) but we use a top navbar for simplicity -->
        <nav class="navbar navbar-dark bg-dark-glass px-3">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <i class="bi bi-hdd-stack-fill me-2"></i>Server Hub
                </a>
                <div class="d-flex">
                    <span class="navbar-text text-light me-3" id="userEmailNav">Loading...</span>
                    <button id="logoutBtn" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </button>
                </div>
            </div>
        </nav>

        <div class="container mt-4">
            <!-- User info card -->
            <div class="row mb-4">
                <div class="col-md-6">
                    <div class="card glass-card h-100">
                        <div class="card-body">
                            <h5 class="card-title"><i class="bi bi-person-circle me-2"></i>Profile</h5>
                            <div id="userInfo">Loading...</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card glass-card h-100">
                        <div class="card-body">
                            <h5 class="card-title"><i class="bi bi-graph-up me-2"></i>Generate Report</h5>
                            <button id="generateBtn" class="btn btn-primary btn-generate">
                                <i class="bi bi-plus-circle me-2"></i>New Report
                            </button>
                            <div id="generateMsg" class="mt-2"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Chart card -->
            <div class="card glass-card mb-4">
                <div class="card-header bg-transparent border-0 pt-3">
                    <h5><i class="bi bi-bar-chart-steps me-2"></i>CPU & Memory Trend (last 10 reports)</h5>
                </div>
                <div class="card-body">
                    <canvas id="cpuChart" width="400" height="200" style="max-height: 300px;"></canvas>
                </div>
            </div>

            <!-- Reports table card -->
            <div class="card glass-card">
                <div class="card-header bg-transparent border-0 pt-3">
                    <h5><i class="bi bi-table me-2"></i>Recent Reports</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th><i class="bi bi-clock me-1"></i>Timestamp</th>
                                    <th><i class="bi bi-cpu me-1"></i>CPU %</th>
                                    <th><i class="bi bi-memory me-1"></i>Memory %</th>
                                    <th><i class="bi bi-hdd me-1"></i>Disk %</th>
                                    <th><i class="bi bi-wifi me-1"></i>Network (KB)</th>
                                </tr>
                            </thead>
                            <tbody id="reportTable">
                                <tr><td colspan="5" class="text-center text-muted py-4">Loading reports...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
