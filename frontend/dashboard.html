<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Hub · Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark-glass px-3">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="bi bi-hdd-stack-fill me-2"></i>Server Hub</a>
            <div class="d-flex">
                <span class="navbar-text text-light me-3" id="userEmailNav">Loading...</span>
                <button id="logoutBtn" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i> Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- User info card -->
<div class="row mb-4">
    <div class="col-md-4">
        <div class="card glass-card h-100">
            <div class="card-body text-center">
                <h5 class="card-title"><i class="bi bi-cpu me-2"></i>CPU</h5>
                <canvas id="cpuGauge" width="150" height="150"></canvas>
                <div id="cpuPercent" class="mt-2 fw-bold"></div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card glass-card h-100">
            <div class="card-body text-center">
                <h5 class="card-title"><i class="bi bi-memory me-2"></i>Memory</h5>
                <canvas id="memGauge" width="150" height="150"></canvas>
                <div id="memPercent" class="mt-2 fw-bold"></div>
                <div id="memDetails" class="small text-muted mt-1"></div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card glass-card h-100">
            <div class="card-body">
                <h5 class="card-title"><i class="bi bi-hdd-stack me-2"></i>Disk Usage</h5>
                <div id="diskInfo">Loading...</div>
                <div class="progress mt-2">
                    <div id="diskProgress" class="progress-bar bg-warning" role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- System info card -->
<div class="row mb-4">
    <div class="col-12">
        <div class="card glass-card">
            <div class="card-body">
                <h5 class="card-title"><i class="bi bi-info-circle me-2"></i>System Information</h5>
                <div id="sysInfo" class="row g-2">Loading...</div>
            </div>
        </div>
    </div>
</div>

        <!-- Controls: refresh and date range -->
        <div class="card glass-card mb-4">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <button id="generateBtn" class="btn btn-primary"><i class="bi bi-plus-circle me-2"></i>Generate Report</button>
                    <button id="exportBtn" class="btn btn-outline-light ms-2"><i class="bi bi-download"></i> Export CSV</button>
                </div>
                <div>
                    <label class="me-2"><i class="bi bi-arrow-repeat"></i> Auto-refresh (10s)</label>
                    <input type="checkbox" id="autoRefreshCheck" checked>
                    <select id="dateRangeSelect" class="form-select d-inline-block w-auto ms-3">
                        <option value="1">Last 24 hours</option>
                        <option value="7" selected>Last 7 days</option>
                        <option value="30">Last 30 days</option>
                        <option value="">All time</option>
                    </select>
                </div>
            </div>
            <div id="generateMsg" class="px-3 pb-2"></div>
        </div>

        <!-- History chart -->
        <div class="card glass-card mb-4">
            <div class="card-header bg-transparent border-0 pt-3">
                <h5><i class="bi bi-bar-chart-steps me-2"></i>CPU & Memory History</h5>
            </div>
            <div class="card-body">
                <canvas id="historyChart" width="400" height="200" style="max-height: 300px;"></canvas>
            </div>
        </div>

        <!-- Reports table -->
        <div class="card glass-card">
            <div class="card-header bg-transparent border-0 pt-3">
                <h5><i class="bi bi-table me-2"></i>Recent Reports</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr><th><i class="bi bi-clock me-1"></i>Timestamp</th><th><i class="bi bi-cpu me-1"></i>CPU %</th><th><i class="bi bi-memory me-1"></i>Memory %</th><th><i class="bi bi-hdd me-1"></i>Disk %</th><th><i class="bi bi-wifi me-1"></i>Network (KB)</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="reportTable"><tr><td colspan="6" class="text-center text-muted py-4">Loading...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
