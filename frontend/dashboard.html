<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Hub Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">Server Hub</span>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header">User Info</div>
                    <div class="card-body" id="userInfo"></div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header">Generate New Report</div>
                    <div class="card-body">
                        <button id="generateBtn" class="btn btn-primary">Generate Report</button>
                        <div id="generateMsg" class="mt-2"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-header">Server Reports</div>
            <div class="card-body">
                <canvas id="cpuChart" width="400" height="200"></canvas>
                <hr>
                <div class="table-responsive">
                    <table class="table table-striped table-sm">
                        <thead>
                            <tr><th>Timestamp</th><th>CPU %</th><th>Memory %</th><th>Disk %</th><th>Network (KB)</th></tr>
                        </thead>
                        <tbody id="reportTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script>
        const API_BASE = ''; // empty means same origin (localhost:8000)
        let cpuChart = null;

        function getToken() {
            return localStorage.getItem('access_token');
        }

        async function apiFetch(endpoint, options = {}) {
            const token = getToken();
            const headers = {
                'Authorization': `Bearer ${token}`,
                ...options.headers
            };
            const res = await fetch(API_BASE + endpoint, { ...options, headers });
            if (res.status === 401) {
                localStorage.removeItem('access_token');
                window.location.href = '/login';
                throw new Error('Unauthorized');
            }
            return res;
        }

        async function loadUser() {
            const res = await apiFetch('/api/auth/me');
            if (res.ok) {
                const user = await res.json();
                document.getElementById('userInfo').innerHTML = `
                    <p><strong>Email:</strong> ${user.email}</p>
                    <p><strong>Name:</strong> ${user.full_name || 'N/A'}</p>
                    <p><strong>ID:</strong> ${user.id}</p>
                `;
            }
        }

        async function loadReports() {
            const res = await apiFetch('/api/reports/');
            if (res.ok) {
                const data = await res.json();
                const reports = data.reports;
                const tbody = document.getElementById('reportTable');
                if (reports.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center">No reports yet. Click "Generate Report"</td></tr>';
                    if (cpuChart) cpuChart.destroy();
                    return;
                }
                tbody.innerHTML = reports.map(r => `
                    <tr>
                        <td>${new Date(r.created_at).toLocaleString()}</td>
                        <td>${r.cpu_percent.toFixed(1)}%</td>
                        <td>${r.memory_percent.toFixed(1)}%</td>
                        <td>${r.disk_percent.toFixed(1)}%</td>
                        <td>${((r.network?.bytes_recv || 0) / 1024).toFixed(1)} / ${((r.network?.bytes_sent || 0) / 1024).toFixed(1)}</td>
                    </tr>
                `).join('');
                // Update chart with latest 10 CPU/memory values
                const labels = reports.slice(-10).map(r => new Date(r.created_at).toLocaleTimeString());
                const cpuData = reports.slice(-10).map(r => r.cpu_percent);
                const memData = reports.slice(-10).map(r => r.memory_percent);
                if (cpuChart) cpuChart.destroy();
                const ctx = document.getElementById('cpuChart').getContext('2d');
                cpuChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'CPU %', data: cpuData, borderColor: 'red', fill: false },
                            { label: 'Memory %', data: memData, borderColor: 'blue', fill: false }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: true }
                });
            }
        }

        async function generateReport() {
            const btn = document.getElementById('generateBtn');
            const msgDiv = document.getElementById('generateMsg');
            btn.disabled = true;
            msgDiv.innerHTML = '<div class="spinner-border spinner-border-sm" role="status"></div> Generating...</div>';
            const res = await apiFetch('/api/reports/', { method: 'POST' });
            if (res.ok) {
                msgDiv.innerHTML = '<div class="alert alert-success">Report generated successfully!</div>';
                await loadReports();
                setTimeout(() => msgDiv.innerHTML = '', 3000);
            } else {
                const err = await res.text();
                msgDiv.innerHTML = `<div class="alert alert-danger">Error: ${err}</div>`;
            }
            btn.disabled = false;
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
        });
        document.getElementById('generateBtn').addEventListener('click', generateReport);

        // Check token on load
        if (!getToken()) {
            window.location.href = '/login';
        } else {
            loadUser();
            loadReports();
            setInterval(loadReports, 30000); // refresh every 30 seconds
        }
    </script>
</body>
</html>
