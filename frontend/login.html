<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">Login</div>
                <div class="card-body">
                    <input id="email" class="form-control mb-2" placeholder="Email">
                    <input id="password" type="password" class="form-control mb-2" placeholder="Password">
                    <button id="loginBtn" class="btn btn-primary w-100">Login</button>
                    <div id="error" class="text-danger mt-2"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: new URLSearchParams({username: email, password: password})
        });
        if (res.ok) {
            const data = await res.json();
            localStorage.setItem('access_token', data.access_token);
            window.location.href = '/dashboard';
        } else {
            const err = await res.json();
            document.getElementById('error').innerText = err.detail;
        }
    });
</script>
</body>
</html>
